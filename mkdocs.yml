site_name: mclip
site_description: MCP-CLI Protocol — consolidate any CLI into MCP tools via automatic introspection
repo_url: https://github.com/kamilrybacki/mclip

theme:
  name: material
  palette:
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - content.code.copy
    - navigation.sections
    - navigation.expand
    - toc.follow

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: sphinx
            show_source: true
            show_root_heading: true
            members_order: source
            merge_init_into_class: true
            show_symbol_type_heading: true
            show_symbol_type_toc: true

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Architecture: architecture.md
  - MCP Tools: tools.md
  - API Reference:
      - Schema: api/schema.md
      - Registry: api/registry.md
      - Executor: api/executor.md
      - Server: api/server.md
      - Introspection:
          - Engine: api/introspect/engine.md
          - Help Parser: api/introspect/help.md
          - Man Parser: api/introspect/man.md
          - Completions Parser: api/introspect/completions.md
